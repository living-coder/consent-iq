steps:
  # Build and push with Kaniko — layers are cached in GCR between builds
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: build-push
    args:
      - '--context=dir:///workspace'
      - '--dockerfile=/workspace/Dockerfile'
      - '--destination=gcr.io/$PROJECT_ID/consent-iq:$SHORT_SHA'
      - '--destination=gcr.io/$PROJECT_ID/consent-iq:latest'
      - '--build-arg=PORT=8080'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--cache-repo=gcr.io/$PROJECT_ID/consent-iq/cache'

  # Deploy to GKE
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: deploy
    args:
      - 'run'
      - '-f=k8s/'
      - '-i=gcr.io/$PROJECT_ID/consent-iq:$SHORT_SHA'
      - '-l=gcr.io/$PROJECT_ID/consent-iq:latest'
      - '-o=/workspace/output'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1'
    waitFor: ['build-push']

images:
  - 'gcr.io/$PROJECT_ID/consent-iq:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/consent-iq:latest'

substitutions:
  _PORT: '8080'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
